<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRA NETWORK</title>

  <script src="https://libtl.com/sdk.js"
          data-zone="9027378"
          data-sdk="show_9027378"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
  <div class="loader-logo">MIRA</div>
</div>

<!-- SOUND -->
<audio id="click-sound">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
          type="audio/mpeg">
</audio>

<!-- BACKGROUND -->
<div class="bg-blur blur-1"></div>
<div class="bg-blur blur-2"></div>

<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">

    <div>
      <p class="small-text">Welcome Back</p>
      <h1>MIRA NETWORK</h1>
    </div>

    <div class="profile-circle">
      M
    </div>

  </header>

  <!-- HOME -->
  <div id="home-page" class="page">

    <section class="wallet-card">

      <div class="wallet-top">
        <span>Your Balance</span>
        <span class="live-dot"></span>
      </div>

      <div class="wallet-balance">
        <span id="token-balance">0.00</span>
        <small>MIRA</small>
      </div>

    </section>

    <section class="promo-card">

      <div>
        <h2>Earn Free Tokens</h2>

        <p>
          Watch ads and collect rewards instantly.
        </p>
      </div>

      <div class="promo-icon">⚡</div>

    </section>

    <section class="main-action">

      <button id="watch-ad-btn"
              class="earn-btn">

        ▶ Watch Ad +10 MIRA

      </button>

      <p id="status-msg"
         class="status-msg"></p>

      <div id="cooldown-text"
           class="cooldown hidden">

        Next reward in
        <span id="timer">30</span>s

      </div>

    </section>

  </div>

  <!-- WALLET -->
  <div id="wallet-page"
       class="page"
       style="display:none;">

    <section class="wallet-card">

      <h2>Wallet</h2>

      <div class="wallet-balance">

        <span id="wallet-balance-page">
          0.00
        </span>

        <small>MIRA</small>

      </div>

      <button class="earn-btn"
              style="margin-top:20px;">

        Withdraw

      </button>

    </section>

  </div>

  <!-- FRIENDS -->
  <div id="friends-page"
       class="page"
       style="display:none;">

    <section class="wallet-card">

      <h2>Referral Program</h2>

      <div class="promo-card"
           style="margin-top:20px;">

        <div>

          <h3>Your Referral Code</h3>

          <p>MIRA-72829</p>

        </div>

        <div class="promo-icon">
          👥
        </div>

      </div>

    </section>

  </div>

  <!-- SETTINGS -->
  <div id="settings-page"
       class="page"
       style="display:none;">

    <section class="wallet-card">

      <h2>Settings</h2>

      <div class="stat-box"
           style="margin-top:20px;">

        <h3>Theme</h3>
        <p>Dark Mode</p>

      </div>

      <div class="stat-box"
           style="margin-top:15px;">

        <h3>Language</h3>
        <p>Uzbek</p>

      </div>

    </section>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">

    <button class="nav-item active"
            data-page="home-page">

      <span>🏠</span>
      <p>Home</p>

    </button>

    <button class="nav-item"
            data-page="wallet-page">

      <span>💰</span>
      <p>Wallet</p>

    </button>

    <button class="nav-item"
            data-page="friends-page">

      <span>👥</span>
      <p>Friends</p>

    </button>

    <button class="nav-item"
            data-page="settings-page">

      <span>⚙</span>
      <p>Settings</p>

    </button>

  </nav>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
